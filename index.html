<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030508" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ClinIQ — Clinical Decision Support</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <style>
      body { margin: 0; background: #030508; font-family: 'Inter', sans-serif; }
      #preloader {
        position: fixed; inset: 0; z-index: 9999;
        background: #030508;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.4s ease;
      }
      #preloader.hide { opacity: 0; pointer-events: none; }
      #preloader img { width: 56px; height: 56px; border-radius: 14px; margin-bottom: 20px; }
      #preloader .name { font-size: 22px; font-weight: 700; color: #f0f2f5; letter-spacing: -0.5px; }
      #preloader .sub { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 6px; text-transform: uppercase; letter-spacing: 2px; }
      #preloader .bar { width: 120px; height: 3px; background: rgba(255,255,255,0.06); border-radius: 3px; margin-top: 28px; overflow: hidden; }
      #preloader .bar-fill { height: 100%; width: 30%; background: linear-gradient(90deg, #4da3ff, #7c5cfc); border-radius: 3px; animation: preload 1.2s ease infinite; }
      @keyframes preload { 0% { width: 10%; margin-left: 0; } 50% { width: 60%; margin-left: 20%; } 100% { width: 10%; margin-left: 90%; } }
    </style>
  </head>
  <body>
    <div id="preloader">
      <img src="/favicon.png" alt="" />
      <div class="name">ClinIQ</div>
      <div class="sub">Clinical Decision Support</div>
      <div class="bar"><div class="bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
