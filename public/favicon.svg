<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#111"/>
  <g transform="translate(18,6) scale(0.44)" fill="#D8FE91">
    <!-- Rod of Asclepius / Caduceus - single snake -->
    <circle cx="32" cy="6" r="5"/>
    <rect x="29" y="10" width="6" height="100" rx="3"/>
    <!-- Snake body wrapping around rod -->
    <path d="M32 25 C10 30, 10 45, 32 50 C54 55, 54 70, 32 75 C10 80, 10 95, 32 100" fill="none" stroke="#D8FE91" stroke-width="7" stroke-linecap="round"/>
    <!-- Snake head -->
    <circle cx="14" cy="28" r="4"/>
    <path d="M14 28 C8 24, 6 28, 10 30" fill="#D8FE91"/>
  </g>
</svg>
